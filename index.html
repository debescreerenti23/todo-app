<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="fondo">

    <!--Reloj en tiempo real-->
    <div id="clock">
        <span id="time">00:00:00</span>
        <span id="date">Lun, 4 Feb</span>
    </div>
    
    <!-- Widget tiempo -->
    <div class="weather">
        <h4 id="weatherCity"></h4>
        <h4 id="weatherTemp"></h4>
        <h4 id="weatherDesc"></h4>
    </div>


    <!-- Contenedor principal de la app -->
    <div class="app">

        <!-- Título -->
        <h2 class="title">📑 Lista de tareas </h2>

        <!-- Sección del input y el botón -->
        <div class="input-section">
            <!-- Campo donde el usuario escribe la tarea -->
            <input type="text" id="taskInput" placeholder="Nueva tarea">

            <!-- Botón para añadir la tarea -->
            <button id="addTaskBtn">Añadir ✅</button>
        </div>

        <div class="deleteAll">
            <button class="deleteAllBtn">Eliminar todas las tareas 🗑️</button>

        </div>

        <!-- Lista donde se insertarán las tareas -->
        <ul id="taskList"></ul>

        <div id="taskCounter">
            Total 📍: <span id="totalTasks">0</span> |
            Completadas 🆗: <span id="completedTasks">0</span> |
            Pendientes ⏳: <span id="pendingTasks">0</span>
        </div>

    </div>

    <script src="script.js"></script>

    <!--Flujo Git para este proyecto:

    ANTES de trabajar:
    git pull      → Trae los últimos cambios de GitHub

    DESPUÉS de trabajar:
     git status    → Ver qué archivos cambiaron
     git add .     → Preparar cambios
     git commit -m "Mensaje descriptivo"  → Guardar cambios localmente
     git push      → Subir cambios a GitHub

    Notas:
    - Siempre hacer git pull antes de trabajar en otro PC
    - git push solo cuando hayas confirmado los cambios-->


</body>
</html>
